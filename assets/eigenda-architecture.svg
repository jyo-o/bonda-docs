<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#4263eb" stroke-width="1.2"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#2f9e44" stroke-width="1.2"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#e67700" stroke-width="1.2"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#7048e8" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fcfcfc" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="20" font-weight="bold" fill="#1e1e1e">EigenDA Architecture</text>
  <text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="11" fill="#888">Data Flow, Trust Boundaries &amp; Component Map</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- TRUST BOUNDARIES                                    -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- TB0: Proxy (no auth) -->
  <rect x="52" y="90" width="120" height="290" rx="10" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <text x="112" y="107" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="10" fill="#888">TB0: No Auth</text>

  <!-- TB1: Disperser entry (ECDSA + commitment verification) -->
  <rect x="185" y="90" width="290" height="290" rx="10" fill="none" stroke="#4263eb" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.5"/>
  <text x="330" y="107" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="10" fill="#4263eb">TB1: ECDSA + Commitment Verification</text>

  <!-- TB2: Disperser ↔ DA Nodes (KZG + BLS) -->
  <rect x="488" y="90" width="200" height="290" rx="10" fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.5"/>
  <text x="588" y="107" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="10" fill="#e67700">TB2: KZG + BLS</text>

  <!-- TB3: Off-chain / On-chain boundary -->
  <line x1="30" y1="415" x2="870" y2="415" stroke="#7048e8" stroke-width="1.8" stroke-dasharray="10,5" opacity="0.5"/>
  <text x="780" y="410" text-anchor="end" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="10" fill="#7048e8">TB3: Off-chain / On-chain</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- OFF-CHAIN COMPONENTS                                -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Proxy -->
  <rect x="68" y="175" width="90" height="55" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="113" y="198" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#495057">Proxy</text>
  <text x="113" y="218" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#868e96">Entry point</text>

  <!-- Disperser API -->
  <rect x="200" y="140" width="120" height="58" rx="10" fill="#dbe4ff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="260" y="166" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#364fc7">Disperser API</text>
  <text x="260" y="184" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#5c7cfa">Routing + Validation</text>

  <!-- Controller -->
  <rect x="200" y="240" width="120" height="58" rx="10" fill="#dbe4ff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="260" y="266" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#364fc7">Controller</text>
  <text x="260" y="284" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#5c7cfa">Encode, Pay, Sigs</text>

  <!-- Encoder -->
  <rect x="355" y="175" width="105" height="55" rx="10" fill="#dbe4ff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="407" y="198" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#364fc7">Encoder</text>
  <text x="407" y="216" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#5c7cfa">KZG + Chunking</text>

  <!-- DA Nodes -->
  <rect x="505" y="150" width="165" height="70" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="587" y="178" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="14" font-weight="bold" fill="#2b8a3e">DA Nodes</text>
  <text x="587" y="198" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#51cf66">Chunk Storage + BLS Sigs</text>
  <text x="587" y="212" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#868e96">N operators</text>

  <!-- Relay -->
  <rect x="510" y="265" width="130" height="55" rx="10" fill="#fff4e6" stroke="#e67700" stroke-width="1.5"/>
  <text x="575" y="288" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#e67700">Relay</text>
  <text x="575" y="308" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#d9480f">SPOF - single instance</text>

  <!-- Rollup (external caller) -->
  <rect x="730" y="165" width="110" height="55" rx="10" fill="#f8f9fa" stroke="#ced4da" stroke-width="1.5"/>
  <text x="785" y="188" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#495057">Rollup</text>
  <text x="785" y="206" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#868e96">Consumer</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ON-CHAIN COMPONENTS                                 -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Ethereum L1 base -->
  <rect x="100" y="450" width="700" height="110" rx="12" fill="#f3f0ff" stroke="#9775fa" stroke-width="1" opacity="0.35"/>
  <text x="450" y="550" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="12" fill="#7048e8" opacity="0.7">Ethereum L1</text>

  <!-- CertVerifier -->
  <rect x="200" y="465" width="155" height="55" rx="10" fill="#e5dbff" stroke="#7048e8" stroke-width="1.5"/>
  <text x="277" y="489" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#5f3dc4">CertVerifier</text>
  <text x="277" y="508" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#7950f2">On-chain cert check</text>

  <!-- Registries -->
  <rect x="530" y="465" width="155" height="55" rx="10" fill="#e5dbff" stroke="#7048e8" stroke-width="1.5"/>
  <text x="607" y="489" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="13" font-weight="bold" fill="#5f3dc4">Registries</text>
  <text x="607" y="508" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#7950f2">Operator Reg + Governance</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- WRITE PATH ARROWS (solid blue)                      -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Proxy → Disperser API -->
  <path d="M158,195 C175,185 185,172 198,170" fill="none" stroke="#4263eb" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <text x="175" y="175" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#4263eb">blob</text>

  <!-- Disperser API → Controller -->
  <line x1="260" y1="198" x2="260" y2="238" stroke="#4263eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Controller → Encoder -->
  <path d="M320,256 C340,245 350,220 355,210" fill="none" stroke="#4263eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="348" y="240" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#4263eb">encode</text>

  <!-- Encoder → DA Nodes -->
  <path d="M460,195 C475,190 490,188 503,187" fill="none" stroke="#4263eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="482" y="183" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#4263eb">chunks</text>

  <!-- DA Nodes → Controller (BLS sigs return) -->
  <path d="M505,205 C430,240 360,270 322,270" fill="none" stroke="#2f9e44" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="420" y="252" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#2f9e44">BLS sigs</text>

  <!-- Controller → CertVerifier (on-chain submission) -->
  <path d="M260,298 C260,370 270,430 270,463" fill="none" stroke="#7048e8" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="248" y="390" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#7048e8">DACert</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- READ PATH ARROWS (orange)                           -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Rollup → Relay (read request) -->
  <path d="M730,200 C680,230 660,260 642,280" fill="none" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="700" y="250" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#e67700">retrieve</text>

  <!-- Relay → DA Nodes (fetch chunks) -->
  <path d="M575,265 C575,245 580,230 585,222" fill="none" stroke="#e67700" stroke-width="1.3" marker-end="url(#arr-orange)"/>
  <text x="600" y="248" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#e67700">pull</text>

  <!-- Proxy → Relay (alternative read) -->
  <path d="M148,230 C180,310 400,295 508,290" fill="none" stroke="#e67700" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="330" y="305" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#e67700">alt read</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ON-CHAIN ARROWS                                     -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Registries → DA Nodes (operator state) -->
  <path d="M607,465 C607,400 595,350 590,322" fill="none" stroke="#7048e8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="620" y="390" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#7048e8">operator state</text>

  <!-- CertVerifier ↔ Registries (verification) -->
  <line x1="355" y1="490" x2="528" y2="490" stroke="#7048e8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="442" y="484" text-anchor="middle" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="8" fill="#7048e8">quorum check</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- LEGEND                                              -->
  <!-- ════════════════════════════════════════════════════ -->

  <rect x="30" y="568" width="840" height="26" rx="6" fill="#f8f9fa" stroke="#e9ecef" stroke-width="1"/>

  <!-- Write path -->
  <line x1="50" y1="581" x2="72" y2="581" stroke="#4263eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="82" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Write path</text>

  <!-- Read path -->
  <line x1="160" y1="581" x2="182" y2="581" stroke="#e67700" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="192" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Read path</text>

  <!-- Return / async -->
  <line x1="270" y1="581" x2="292" y2="581" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="302" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Return</text>

  <!-- On-chain -->
  <line x1="365" y1="581" x2="387" y2="581" stroke="#7048e8" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="397" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">On-chain</text>

  <!-- Component colors -->
  <rect x="480" y="575" width="12" height="12" rx="3" fill="#dbe4ff" stroke="#4263eb" stroke-width="1"/>
  <text x="498" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Disperser</text>

  <rect x="565" y="575" width="12" height="12" rx="3" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1"/>
  <text x="583" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">DA Nodes</text>

  <rect x="650" y="575" width="12" height="12" rx="3" fill="#fff4e6" stroke="#e67700" stroke-width="1"/>
  <text x="668" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Relay</text>

  <rect x="720" y="575" width="12" height="12" rx="3" fill="#e5dbff" stroke="#7048e8" stroke-width="1"/>
  <text x="738" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">On-chain</text>

  <rect x="800" y="575" width="12" height="12" rx="3" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1"/>
  <text x="818" y="585" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji" font-size="9" fill="#555">Ext</text>
</svg>
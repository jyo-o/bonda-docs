<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4263eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9e44"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67700"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e03131"/>
    </marker>
  </defs>

  <rect width="920" height="620" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Ethereum Fulu Fork — PeerDAS Architecture</text>
  <text x="460" y="44" text-anchor="middle" font-size="10" fill="#888">Trust Boundaries &amp; Data Flow (EIP-7594)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TRUST BOUNDARIES                            -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- TB-1: User → EL (untrusted blob TX) -->
  <rect x="18" y="62" width="215" height="300" rx="8" fill="none" stroke="#e03131" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55"/>
  <text x="28" y="79" font-size="9" fill="#e03131" font-weight="600">TB-1: User → EL (untrusted blob TX)</text>

  <!-- TB-2: EL ↔ CL (Engine API, JWT) -->
  <rect x="243" y="62" width="155" height="300" rx="8" fill="none" stroke="#4263eb" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55"/>
  <text x="253" y="79" font-size="9" fill="#4263eb" font-weight="600">TB-2: EL ↔ CL (JWT)</text>

  <!-- TB-3: CL ↔ Peers (P2P gossip) -->
  <rect x="408" y="62" width="275" height="300" rx="8" fill="none" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55"/>
  <text x="418" y="79" font-size="9" fill="#2f9e44" font-weight="600">TB-3: CL ↔ Peers (P2P gossip)</text>

  <!-- TB-4: CL ↔ Crypto (c-kzg-4844 FFI) -->
  <rect x="693" y="62" width="210" height="185" rx="8" fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55"/>
  <text x="703" y="79" font-size="9" fill="#e67700" font-weight="600">TB-4: CL ↔ Crypto (FFI)</text>

  <!-- TB-5: Cross-Client (bottom zone) -->
  <rect x="408" y="390" width="495" height="185" rx="8" fill="none" stroke="#d6336c" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55"/>
  <text x="418" y="407" font-size="9" fill="#d6336c" font-weight="600">TB-5: Cross-Client (Lighthouse vs Prysm divergence)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- EL LAYER (left)                             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- User / TX Origin -->
  <rect x="30" y="110" width="90" height="50" rx="6" fill="#f8f9fa" stroke="#868e96" stroke-width="1.5"/>
  <text x="75" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#333">User</text>
  <text x="75" y="148" text-anchor="middle" font-size="8" fill="#666">Type-3 Blob TX</text>

  <!-- Blobpool -->
  <rect x="30" y="200" width="190" height="65" rx="6" fill="#f1f3f5" stroke="#868e96" stroke-width="1.5"/>
  <text x="125" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Blobpool</text>
  <text x="125" y="240" text-anchor="middle" font-size="8" fill="#666">Blob TX validation &amp; storage</text>
  <text x="125" y="253" text-anchor="middle" font-size="8" fill="#888">(Billy DB)</text>

  <!-- Arrow: User → Blobpool -->
  <line x1="75" y1="160" x2="75" y2="198" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="83" y="183" font-size="7" fill="#555">submit</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ENGINE API (center bridge)                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Engine API -->
  <rect x="258" y="125" width="125" height="65" rx="6" fill="#dbe4ff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="320" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Engine API</text>
  <text x="320" y="165" text-anchor="middle" font-size="8" fill="#666">EL ↔ CL bridge</text>
  <text x="320" y="178" text-anchor="middle" font-size="8" fill="#4263eb">JWT-authenticated</text>

  <!-- Arrow: Blobpool → Engine API -->
  <line x1="220" y1="225" x2="256" y2="170" stroke="#4263eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="227" y="193" font-size="7" fill="#4263eb">blobs + proofs</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CL LAYER (right-center)                     -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- CL Block Builder -->
  <rect x="420" y="95" width="130" height="65" rx="6" fill="#dbe4ff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="485" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#333">CL Block Builder</text>
  <text x="485" y="133" text-anchor="middle" font-size="8" fill="#666">Block proposal</text>
  <text x="485" y="146" text-anchor="middle" font-size="8" fill="#888">data column gossip</text>

  <!-- Arrow: Engine API → CL Block Builder -->
  <line x1="383" y1="147" x2="418" y2="133" stroke="#4263eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="398" y="130" font-size="7" fill="#4263eb">FCU</text>

  <!-- PeerDAS Gossip -->
  <rect x="420" y="190" width="130" height="65" rx="6" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="485" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#333">PeerDAS Gossip</text>
  <text x="485" y="228" text-anchor="middle" font-size="8" fill="#666">Custody group via</text>
  <text x="485" y="241" text-anchor="middle" font-size="8" fill="#2f9e44">node_id assignment</text>

  <!-- Arrow: CL Block Builder → PeerDAS Gossip -->
  <line x1="485" y1="160" x2="485" y2="188" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="505" y="178" font-size="7" fill="#2f9e44">columns</text>

  <!-- DA Checker -->
  <rect x="575" y="190" width="100" height="65" rx="6" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="625" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#333">DA Checker</text>
  <text x="625" y="228" text-anchor="middle" font-size="8" fill="#666">Column custody</text>
  <text x="625" y="241" text-anchor="middle" font-size="8" fill="#2f9e44">DA verification</text>

  <!-- Arrow: PeerDAS Gossip → DA Checker -->
  <line x1="550" y1="222" x2="573" y2="222" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Reconstruction -->
  <rect x="470" y="290" width="140" height="60" rx="6" fill="#fff4e6" stroke="#e67700" stroke-width="1.5"/>
  <text x="540" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Reconstruction</text>
  <text x="540" y="328" text-anchor="middle" font-size="8" fill="#666">recover_cells_and_kzg_proofs</text>
  <text x="540" y="341" text-anchor="middle" font-size="8" fill="#e67700">on cache miss</text>

  <!-- Arrow: DA Checker → Reconstruction (fallback) -->
  <path d="M625,255 L625,275 Q625,290 610,290 L612,290" fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="640" y="278" font-size="7" fill="#e67700">fallback</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- KZG LIBRARY (right)                         -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- KZG Library -->
  <rect x="710" y="100" width="175" height="65" rx="6" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="797" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#333">KZG Library</text>
  <text x="797" y="138" text-anchor="middle" font-size="8" fill="#666">Commitment &amp; proof verification</text>
  <text x="797" y="151" text-anchor="middle" font-size="8" fill="#e67700">c-kzg-4844 FFI boundary</text>

  <!-- Arrow: DA Checker → KZG (verify) -->
  <line x1="675" y1="210" x2="708" y2="150" stroke="#e67700" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="700" y="188" font-size="7" fill="#e67700">verify_proof</text>

  <!-- Arrow: Reconstruction → KZG -->
  <line x1="610" y1="305" x2="730" y2="165" stroke="#e67700" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <text x="685" y="240" font-size="7" fill="#e67700">recover_cells</text>

  <!-- Arrow: CL Block Builder → KZG (verify commitment) -->
  <line x1="550" y1="115" x2="708" y2="120" stroke="#e67700" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <text x="630" y="109" font-size="7" fill="#e67700">verify_blob_kzg</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MULTI-CLIENT ZONE (bottom)                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Lighthouse -->
  <rect x="430" y="425" width="160" height="70" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1.5"/>
  <text x="510" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Lighthouse</text>
  <text x="510" y="465" text-anchor="middle" font-size="8" fill="#666">Rust — reconstruct_data_columns</text>
  <text x="510" y="479" text-anchor="middle" font-size="8" fill="#888">Column-centric cache</text>

  <!-- Prysm -->
  <rect x="630" y="425" width="160" height="70" rx="6" fill="#fff3bf" stroke="#f59f00" stroke-width="1.5"/>
  <text x="710" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Prysm</text>
  <text x="710" y="465" text-anchor="middle" font-size="8" fill="#666">Go — recoverCellsAndProofs</text>
  <text x="710" y="479" text-anchor="middle" font-size="8" fill="#888">Blob-centric cache</text>

  <!-- Divergence warning callout -->
  <rect x="490" y="510" width="260" height="48" rx="8" fill="#fff5f5" stroke="#e03131" stroke-width="1.5"/>
  <text x="530" y="530" font-size="10" fill="#e03131" font-weight="600">⚠</text>
  <text x="548" y="530" font-size="10" fill="#e03131" font-weight="600">Reconstruction divergence risk</text>
  <text x="620" y="546" text-anchor="middle" font-size="8" fill="#c92a2a">Cache strategy mismatch may cause DA verification split</text>

  <!-- Arrow: Reconstruction → Lighthouse -->
  <line x1="510" y1="350" x2="510" y2="423" stroke="#d6336c" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Arrow: Reconstruction → Prysm -->
  <line x1="570" y1="350" x2="680" y2="423" stroke="#d6336c" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Divergence double-arrow between clients -->
  <line x1="590" y1="460" x2="628" y2="460" stroke="#e03131" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="609" y="454" text-anchor="middle" font-size="7" fill="#e03131">≠</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FLOW SUMMARY LABELS                         -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="30" y="300" width="200" height="50" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="130" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#495057">Submission Flow</text>
  <text x="130" y="332" text-anchor="middle" font-size="8" fill="#868e96">TX → Blobpool → Engine API</text>
  <text x="130" y="344" text-anchor="middle" font-size="8" fill="#868e96">→ CL Builder → PeerDAS</text>

  <rect x="260" y="300" width="130" height="50" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="325" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#495057">DAS Flow</text>
  <text x="325" y="332" text-anchor="middle" font-size="8" fill="#868e96">Custody → DA Checker</text>
  <text x="325" y="344" text-anchor="middle" font-size="8" fill="#868e96">→ Reconstruction</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- P2P PEERS (external entity)                 -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="30" y="420" width="130" height="55" rx="6" fill="#f8f9fa" stroke="#868e96" stroke-width="1.5"/>
  <text x="95" y="443" text-anchor="middle" font-size="10" font-weight="600" fill="#333">P2P Peers</text>
  <text x="95" y="458" text-anchor="middle" font-size="8" fill="#666">data_column_sidecar</text>
  <text x="95" y="470" text-anchor="middle" font-size="8" fill="#888">gossip subnet</text>

  <!-- Arrow: P2P Peers → PeerDAS Gossip -->
  <path d="M130,420 L130,380 Q130,370 200,370 Q350,370 440,260" fill="none" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="230" y="365" font-size="7" fill="#2f9e44">gossip subscribe</text>

  <!-- Custody assignment info box -->
  <rect x="710" y="195" width="175" height="46" rx="6" fill="#ebfbee" stroke="#2f9e44" stroke-width="1"/>
  <text x="797" y="213" text-anchor="middle" font-size="9" font-weight="600" fill="#2f9e44">Custody Assignment</text>
  <text x="797" y="228" text-anchor="middle" font-size="8" fill="#666">CUSTODY_REQUIREMENT = 4</text>
  <text x="797" y="238" text-anchor="middle" font-size="7" fill="#888">node_id → subnet mapping</text>

  <!-- Arrow: Custody → DA Checker -->
  <line x1="710" y1="220" x2="677" y2="220" stroke="#2f9e44" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND                                      -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="20" y="588" width="880" height="24" rx="4" fill="#f0f0f0" stroke="none"/>

  <circle cx="40" cy="600" r="4" fill="#f1f3f5" stroke="#868e96"/>
  <text x="50" y="604" font-size="8" fill="#555">EL / External</text>

  <circle cx="130" cy="600" r="4" fill="#dbe4ff" stroke="#4263eb"/>
  <text x="140" y="604" font-size="8" fill="#555">Engine API / CL</text>

  <circle cx="230" cy="600" r="4" fill="#d3f9d8" stroke="#2f9e44"/>
  <text x="240" y="604" font-size="8" fill="#555">DAS / Crypto</text>

  <circle cx="320" cy="600" r="4" fill="#fff4e6" stroke="#e67700"/>
  <text x="330" y="604" font-size="8" fill="#555">Reconstruction</text>

  <line x1="415" y1="600" x2="435" y2="600" stroke="#e03131" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="442" y="604" font-size="8" fill="#e03131">TB-1 Untrusted</text>

  <line x1="520" y1="600" x2="540" y2="600" stroke="#4263eb" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="547" y="604" font-size="8" fill="#4263eb">TB-2 JWT</text>

  <line x1="600" y1="600" x2="620" y2="600" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="627" y="604" font-size="8" fill="#2f9e44">TB-3 P2P</text>

  <line x1="680" y1="600" x2="700" y2="600" stroke="#e67700" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="707" y="604" font-size="8" fill="#e67700">TB-4 FFI</text>

  <line x1="755" y1="600" x2="775" y2="600" stroke="#d6336c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="782" y="604" font-size="8" fill="#d6336c">TB-5 Cross-Client</text>
</svg>
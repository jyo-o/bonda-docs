<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67700"/>
    </marker>
    <marker id="arrow-green-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9e44"/>
    </marker>
    <marker id="arrow-purple-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7048e8"/>
    </marker>
    <marker id="arrow-red-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e03131"/>
    </marker>
  </defs>

  <rect width="820" height="520" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Avail DA Architecture</text>
  <text x="410" y="44" text-anchor="middle" font-size="10" fill="#888">BABE+GRANDPA → Erasure + KZG → DAS → VectorX Bridge</text>

  <!-- Trust Boundaries -->
  <!-- TB0: L2 → Mempool -->
  <line x1="155" y1="55" x2="155" y2="290" stroke="#e67700" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="155" y="52" text-anchor="middle" font-size="8" fill="#e67700">TB0: L2→Mempool</text>

  <!-- TB3: DAS Network -->
  <line x1="545" y1="55" x2="545" y2="290" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="545" y="52" text-anchor="middle" font-size="8" fill="#2f9e44">TB3: DAS Network</text>

  <!-- TB4-TB5: VectorX → Ethereum -->
  <rect x="150" y="310" width="630" height="175" rx="8" fill="none" stroke="#7048e8" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="160" y="328" font-size="9" fill="#7048e8" font-weight="600">TB4–TB5: VectorX → Ethereum</text>

  <!-- External Entity: L2 Rollup -->
  <rect x="30" y="85" width="115" height="55" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="87" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#333">L2 Rollup</text>
  <text x="87" y="122" text-anchor="middle" font-size="9" fill="#666">Sequencer</text>

  <!-- Process: Validator Full Node -->
  <rect x="175" y="65" width="190" height="100" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="270" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Validator Full Node</text>
  <text x="270" y="103" text-anchor="middle" font-size="9" fill="#666">BABE + GRANDPA</text>
  <text x="270" y="118" text-anchor="middle" font-size="8" fill="#888">Erasure Code (k→2k)</text>
  <text x="270" y="133" text-anchor="middle" font-size="8" fill="#888">KZG Commitment</text>
  <text x="270" y="148" text-anchor="middle" font-size="8" fill="#888">~20s block / ~40s finality</text>

  <!-- Datastore: EDS + KZG -->
  <path d="M195,200 Q195,190 270,190 Q345,190 345,200 L345,225 Q345,235 270,235 Q195,235 195,225 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <path d="M195,200 Q195,210 270,210 Q345,210 345,200" fill="none" stroke="#d6b656" stroke-width="1"/>
  <text x="270" y="225" text-anchor="middle" font-size="9" fill="#666">EDS + KZG</text>

  <!-- Datastore: Chain State -->
  <path d="M195,255 Q195,245 270,245 Q345,245 345,255 L345,275 Q345,285 270,285 Q195,285 195,275 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <path d="M195,255 Q195,265 270,265 Q345,265 345,255" fill="none" stroke="#d6b656" stroke-width="1"/>
  <text x="270" y="278" text-anchor="middle" font-size="9" fill="#666">Chain State + Block DB</text>

  <!-- Process: Light Client (DAS) -->
  <rect x="570" y="70" width="195" height="100" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="667" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Light Client (DAS)</text>
  <text x="667" y="110" text-anchor="middle" font-size="9" fill="#666">KZG Validity Proof</text>
  <text x="667" y="125" text-anchor="middle" font-size="8" fill="#888">DHT→RPC fallback</text>
  <text x="667" y="140" text-anchor="middle" font-size="7" fill="#c00">⚠ DHT hit ≈ 0% (ProbeLab)</text>
  <text x="667" y="153" text-anchor="middle" font-size="7" fill="#c00">⚠ Full Node RPC dependent</text>

  <!-- Datastore: DHT -->
  <path d="M590,200 Q590,190 667,190 Q745,190 745,200 L745,222 Q745,232 667,232 Q590,232 590,222 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <path d="M590,200 Q590,210 667,210 Q745,210 745,200" fill="none" stroke="#d6b656" stroke-width="1"/>
  <text x="667" y="225" text-anchor="middle" font-size="9" fill="#666">DHT P2P (Kademlia)</text>

  <!-- VectorX Components -->
  <!-- Process: VectorX Relayer -->
  <rect x="175" y="345" width="160" height="70" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="255" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#333">VectorX Relayer</text>
  <text x="255" y="385" text-anchor="middle" font-size="9" fill="#666">Succinct (Permissioned)</text>
  <text x="255" y="398" text-anchor="middle" font-size="7" fill="#c00">⚠ Single EOA</text>

  <!-- Process: SP1 Prover -->
  <rect x="395" y="345" width="155" height="70" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="472" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#333">SP1 Prover</text>
  <text x="472" y="385" text-anchor="middle" font-size="9" fill="#666">NetworkProver (GPU)</text>
  <text x="472" y="398" text-anchor="middle" font-size="8" fill="#2f9e44">PLONK proof</text>

  <!-- Datastore: SP1Vector Contract -->
  <path d="M570,365 Q570,355 667,355 Q765,355 765,365 L765,395 Q765,405 667,405 Q570,405 570,395 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <path d="M570,365 Q570,375 667,375 Q765,375 765,365" fill="none" stroke="#d6b656" stroke-width="1"/>
  <text x="667" y="397" text-anchor="middle" font-size="9" fill="#666">SP1Vector Contract</text>

  <!-- External: L2 Smart Contract -->
  <rect x="660" y="430" width="115" height="45" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="717" y="450" text-anchor="middle" font-size="9" font-weight="600" fill="#333">L2 Contract</text>
  <text x="717" y="463" text-anchor="middle" font-size="8" fill="#666">(Ethereum)</text>

  <!-- Guardian -->
  <rect x="440" y="440" width="160" height="35" rx="4" fill="#ffe6e6" stroke="#e03131" stroke-width="1.2"/>
  <text x="520" y="462" text-anchor="middle" font-size="9" fill="#e03131">Guardian (4/7 Multisig)</text>

  <!-- Data Flow Arrows -->
  <!-- L2 → Validator -->
  <line x1="145" y1="112" x2="173" y2="112" stroke="#e67700" stroke-width="2" marker-end="url(#arrow-orange-a)"/>
  <text x="156" y="105" text-anchor="middle" font-size="7" fill="#e67700">submitData</text>

  <!-- Validator → EDS + KZG -->
  <line x1="270" y1="165" x2="270" y2="188" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-a)"/>

  <!-- Validator → Chain State -->
  <line x1="250" y1="165" x2="250" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-a)"/>
  <text x="237" y="205" text-anchor="end" font-size="7" fill="#555">Block</text>

  <!-- Light Client ↔ Validator (DAS via RPC) -->
  <line x1="570" y1="100" x2="367" y2="100" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrow-green-a)"/>
  <text x="470" y="93" text-anchor="middle" font-size="7" fill="#2f9e44">kate_queryProof</text>
  <line x1="367" y1="125" x2="568" y2="125" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green-a)"/>
  <text x="470" y="140" text-anchor="middle" font-size="7" fill="#2f9e44">Cell + KZG proof</text>

  <!-- Light Client ↔ DHT -->
  <line x1="667" y1="170" x2="667" y2="188" stroke="#2f9e44" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green-a)"/>
  <text x="710" y="183" text-anchor="start" font-size="7" fill="#2f9e44">re-share</text>

  <!-- Chain State → VectorX Relayer -->
  <line x1="270" y1="285" x2="255" y2="343" stroke="#7048e8" stroke-width="1.5" marker-end="url(#arrow-purple-a)"/>
  <text x="247" y="315" text-anchor="end" font-size="7" fill="#7048e8">Headers + data roots</text>

  <!-- Relayer → SP1 Prover -->
  <line x1="335" y1="380" x2="393" y2="380" stroke="#7048e8" stroke-width="2" marker-end="url(#arrow-purple-a)"/>
  <text x="365" y="373" text-anchor="middle" font-size="7" fill="#7048e8">Prove request</text>

  <!-- SP1 Prover → Relayer (proof return) -->
  <line x1="395" y1="395" x2="337" y2="395" stroke="#7048e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple-a)"/>
  <text x="365" y="408" text-anchor="middle" font-size="7" fill="#7048e8">PLONK proof</text>

  <!-- Relayer → Contract -->
  <path d="M335,370 Q450,330 568,380" fill="none" stroke="#7048e8" stroke-width="2" marker-end="url(#arrow-purple-a)"/>
  <text x="450" y="350" text-anchor="middle" font-size="7" fill="#7048e8">commitHeaderRange()</text>

  <!-- Contract → L2 Contract -->
  <line x1="700" y1="405" x2="717" y2="428" stroke="#7048e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple-a)"/>
  <text x="730" y="418" text-anchor="start" font-size="7" fill="#7048e8">verifyAttestation</text>

  <!-- Guardian → Contract -->
  <line x1="560" y1="455" x2="620" y2="405" stroke="#e03131" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-red-a)"/>
  <text x="600" y="440" text-anchor="middle" font-size="7" fill="#e03131">⚠ No timelock</text>

  <!-- L2 → Chain State (data retrieval) -->
  <line x1="87" y1="140" x2="193" y2="260" stroke="#e67700" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-orange-a)"/>
  <text x="120" y="210" text-anchor="middle" font-size="7" fill="#e67700">Data retrieval</text>

  <!-- Legend -->
  <rect x="30" y="488" width="760" height="24" rx="4" fill="#f0f0f0" stroke="none"/>
  <circle cx="50" cy="500" r="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="60" y="504" font-size="8" fill="#555">Process</text>
  <circle cx="120" cy="500" r="4" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="130" y="504" font-size="8" fill="#555">External</text>
  <circle cx="195" cy="500" r="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="205" y="504" font-size="8" fill="#555">Data Store</text>
  <line x1="280" y1="500" x2="300" y2="500" stroke="#e67700" stroke-width="2"/>
  <text x="307" y="504" font-size="8" fill="#e67700">Submission</text>
  <line x1="370" y1="500" x2="390" y2="500" stroke="#2f9e44" stroke-width="2"/>
  <text x="397" y="504" font-size="8" fill="#2f9e44">DAS Sampling</text>
  <line x1="465" y1="500" x2="485" y2="500" stroke="#7048e8" stroke-width="2"/>
  <text x="492" y="504" font-size="8" fill="#7048e8">VectorX Bridge</text>
  <circle cx="575" cy="500" r="4" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="585" y="504" font-size="8" fill="#555">ZK Prover</text>
  <circle cx="645" cy="500" r="4" fill="#ffe6e6" stroke="#e03131"/>
  <text x="655" y="504" font-size="8" fill="#555">Guardian</text>
</svg>
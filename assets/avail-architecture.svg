<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="Virgil, Segoe UI Emoji, Noto Color Emoji, 'Segoe UI', system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4263eb"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9e44"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67700"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7048e8"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c92a2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Avail DA Architecture</text>
  <text x="450" y="42" text-anchor="middle" font-size="10" fill="#888">Trust Boundaries &amp; Data Flow</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TRUST BOUNDARIES                            -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- TB0: L2 -> Mempool (fee-only) -->
  <rect x="18" y="56" width="168" height="195" rx="8" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="7,4" opacity="0.5"/>
  <text x="28" y="72" font-size="8" fill="#999" font-weight="600">TB0: L2 -> Mempool (fee-only)</text>

  <!-- TB3: DAS Network -->
  <rect x="18" y="268" width="430" height="130" rx="8" fill="none" stroke="#2f9e44" stroke-width="1.3" stroke-dasharray="7,4" opacity="0.5"/>
  <text x="28" y="284" font-size="8" fill="#2f9e44" font-weight="600">TB3: DAS Network (Full Node RPC is de-facto source)</text>

  <!-- TB4-TB5: VectorX -> Ethereum -->
  <rect x="458" y="268" width="425" height="130" rx="8" fill="none" stroke="#e67700" stroke-width="1.3" stroke-dasharray="7,4" opacity="0.5"/>
  <text x="468" y="284" font-size="8" fill="#e67700" font-weight="600">TB4-TB5: VectorX -> Ethereum (no timelock on upgrade)</text>

  <!-- On-chain boundary -->
  <line x1="15" y1="440" x2="885" y2="440" stroke="#7048e8" stroke-width="1.3" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="30" y="454" font-size="8" fill="#7048e8" font-weight="600">Ethereum L1</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 1: SUBMISSION FLOW                      -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- L2 Rollup -->
  <rect x="28" y="84" width="75" height="50" rx="5" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.4"/>
  <text x="65" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#333">L2</text>
  <text x="65" y="118" text-anchor="middle" font-size="8" fill="#666">submitData</text>

  <!-- Mempool -->
  <rect x="120" y="84" width="58" height="50" rx="5" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <text x="149" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Mempool</text>
  <text x="149" y="118" text-anchor="middle" font-size="8" fill="#888">tx pool</text>

  <!-- Validator -->
  <rect x="210" y="62" width="175" height="105" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="297" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Validator</text>
  <text x="297" y="98" text-anchor="middle" font-size="9" fill="#4263eb">BABE + GRANDPA</text>
  <line x1="222" y1="104" x2="373" y2="104" stroke="#6c8ebf" stroke-width="0.6" opacity="0.35"/>
  <text x="297" y="118" text-anchor="middle" font-size="8" fill="#888">Block proposal</text>
  <text x="297" y="131" text-anchor="middle" font-size="8" fill="#888">Erasure coding (k -> 2k)</text>
  <text x="297" y="144" text-anchor="middle" font-size="8" fill="#888">KZG commitments</text>
  <text x="297" y="157" text-anchor="middle" font-size="8" fill="#888">GRANDPA finality</text>

  <!-- Full Node -->
  <rect x="420" y="72" width="135" height="80" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="487" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Full Node</text>
  <line x1="432" y1="102" x2="543" y2="102" stroke="#6c8ebf" stroke-width="0.6" opacity="0.35"/>
  <text x="487" y="116" text-anchor="middle" font-size="8" fill="#888">Block storage</text>
  <text x="487" y="129" text-anchor="middle" font-size="8" fill="#888">RPC endpoint</text>
  <text x="487" y="142" text-anchor="middle" font-size="8" fill="#888">kate_queryProof</text>

  <!-- Submission flow arrows -->
  <line x1="103" y1="109" x2="118" y2="109" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="178" y1="109" x2="208" y2="109" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="385" y1="109" x2="418" y2="109" stroke="#4263eb" stroke-width="1.4" marker-end="url(#arr-b)"/>
  <text x="400" y="102" text-anchor="middle" font-size="7" fill="#4263eb">blocks</text>

  <!-- Submission flow summary label -->
  <rect x="210" y="176" width="340" height="16" rx="3" fill="#e7f5ff" stroke="#74c0fc" stroke-width="0.7"/>
  <text x="380" y="188" text-anchor="middle" font-size="8" font-weight="600" fill="#1971c2">submitData -> Mempool -> BABE -> Erasure Code -> KZG -> GRANDPA</text>

  <!-- Chain State store -->
  <path d="M210,210 Q210,200 297,200 Q385,200 385,210 L385,235 Q385,245 297,245 Q210,245 210,235 Z" fill="#fff2cc" stroke="#d6b656" stroke-width="1.1"/>
  <path d="M210,210 Q210,220 297,220 Q385,220 385,210" fill="none" stroke="#d6b656" stroke-width="0.8"/>
  <text x="297" y="238" text-anchor="middle" font-size="8" fill="#666">Chain State + Block DB</text>

  <!-- Validator -> Chain State -->
  <line x1="297" y1="167" x2="297" y2="198" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 2: DAS FLOW (left) + BRIDGE FLOW (right) -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Light Client -->
  <rect x="30" y="300" width="145" height="82" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="102" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Light Client</text>
  <line x1="42" y1="328" x2="163" y2="328" stroke="#82b366" stroke-width="0.6" opacity="0.35"/>
  <text x="102" y="342" text-anchor="middle" font-size="8" fill="#888">DAS sampling</text>
  <text x="102" y="355" text-anchor="middle" font-size="8" fill="#888">KZG validity proofs</text>
  <text x="102" y="368" text-anchor="middle" font-size="7" fill="#c00">DHT -> RPC fallback</text>

  <!-- DHT callout -->
  <rect x="30" y="390" width="110" height="20" rx="4" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <text x="85" y="404" text-anchor="middle" font-size="9" font-weight="bold" fill="#c92a2a">DHT hit ~ 0%</text>

  <!-- Full Node RPC (DAS target) -->
  <rect x="250" y="300" width="140" height="82" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="320" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Full Node RPC</text>
  <line x1="262" y1="326" x2="378" y2="326" stroke="#6c8ebf" stroke-width="0.6" opacity="0.35"/>
  <text x="320" y="340" text-anchor="middle" font-size="8" fill="#888">kate_queryProof</text>
  <text x="320" y="353" text-anchor="middle" font-size="8" fill="#888">kate_queryRows</text>
  <text x="320" y="370" text-anchor="middle" font-size="7" fill="#c00">de-facto DAS source</text>

  <!-- DAS arrow: Light Client -> Full Node RPC -->
  <line x1="175" y1="330" x2="248" y2="330" stroke="#2f9e44" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <text x="211" y="323" text-anchor="middle" font-size="7" fill="#2f9e44">kate_queryProof</text>

  <!-- DAS return arrow -->
  <line x1="248" y1="350" x2="177" y2="350" stroke="#2f9e44" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="211" y="362" text-anchor="middle" font-size="7" fill="#2f9e44">Cell + KZG proof</text>

  <!-- Full Node upper -> Full Node RPC sync -->
  <line x1="487" y1="152" x2="360" y2="298" stroke="#4263eb" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <text x="440" y="220" text-anchor="middle" font-size="7" fill="#4263eb">sync</text>

  <!-- DAS flow label -->
  <rect x="30" y="418" width="270" height="14" rx="3" fill="#ebfbee" stroke="#82b366" stroke-width="0.7"/>
  <text x="165" y="429" text-anchor="middle" font-size="7" font-weight="600" fill="#2f9e44">DAS: Light Client -> Full Node RPC (kate_queryProof) -- DHT ~ 0%</text>

  <!-- VectorX Relayer -->
  <rect x="475" y="300" width="150" height="82" rx="6" fill="#fff2cc" stroke="#e67700" stroke-width="1.5"/>
  <text x="550" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#333">VectorX Relayer</text>
  <line x1="487" y1="326" x2="613" y2="326" stroke="#e67700" stroke-width="0.6" opacity="0.35"/>
  <text x="550" y="340" text-anchor="middle" font-size="8" fill="#888">Requests SP1 proofs</text>
  <text x="550" y="353" text-anchor="middle" font-size="8" fill="#888">Submits to contract</text>
  <text x="550" y="370" text-anchor="middle" font-size="7" fill="#c00">SPOF -- single EOA</text>

  <!-- SP1 Prover -->
  <rect x="660" y="300" width="130" height="82" rx="6" fill="#fff2cc" stroke="#e67700" stroke-width="1.5"/>
  <text x="725" y="322" text-anchor="middle" font-size="10" font-weight="600" fill="#333">SP1 Prover</text>
  <line x1="672" y1="328" x2="778" y2="328" stroke="#e67700" stroke-width="0.6" opacity="0.35"/>
  <text x="725" y="342" text-anchor="middle" font-size="8" fill="#888">PLONK proof</text>
  <text x="725" y="355" text-anchor="middle" font-size="8" fill="#888">generation</text>
  <text x="725" y="370" text-anchor="middle" font-size="8" fill="#888">NetworkProver (GPU)</text>

  <!-- Chain State -> VectorX Relayer -->
  <path d="M385,230 Q430,230 430,270 Q430,315 473,330" fill="none" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="420" y="265" text-anchor="middle" font-size="7" fill="#e67700">headers + data roots</text>

  <!-- VectorX Relayer -> SP1 Prover -->
  <line x1="625" y1="330" x2="658" y2="330" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="641" y="323" text-anchor="middle" font-size="7" fill="#e67700">req</text>

  <!-- SP1 Prover -> VectorX Relayer (proof return) -->
  <line x1="658" y1="350" x2="627" y2="350" stroke="#e67700" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#arr-o)"/>
  <text x="641" y="362" text-anchor="middle" font-size="7" fill="#e67700">proof</text>

  <!-- Bridge flow label -->
  <rect x="470" y="395" width="310" height="14" rx="3" fill="#fff9db" stroke="#e67700" stroke-width="0.7"/>
  <text x="625" y="406" text-anchor="middle" font-size="7" font-weight="600" fill="#e67700">Bridge: Chain State -> VectorX Relayer -> SP1 Prover -> SP1Vector</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROW 3: ETHEREUM L1                          -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Ethereum background -->
  <rect x="15" y="443" width="870" height="90" rx="5" fill="#f1f3f5" stroke="none"/>

  <!-- Ethereum L1 label -->
  <rect x="30" y="462" width="90" height="40" rx="4" fill="#343a40" stroke="none"/>
  <text x="75" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Ethereum L1</text>
  <text x="75" y="495" text-anchor="middle" font-size="8" fill="#adb5bd">Settlement</text>

  <!-- SP1Vector Contract -->
  <rect x="350" y="455" width="180" height="60" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="440" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#333">SP1Vector Contract</text>
  <line x1="362" y1="484" x2="518" y2="484" stroke="#9673a6" stroke-width="0.6" opacity="0.35"/>
  <text x="440" y="497" text-anchor="middle" font-size="8" fill="#888">Header range commitments</text>
  <text x="440" y="508" text-anchor="middle" font-size="8" fill="#888">on Ethereum</text>

  <!-- Guardian Multisig -->
  <rect x="600" y="455" width="155" height="60" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="677" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Guardian Multisig</text>
  <line x1="612" y1="484" x2="743" y2="484" stroke="#b85450" stroke-width="0.6" opacity="0.35"/>
  <text x="677" y="497" text-anchor="middle" font-size="8" fill="#888">Upgrade control</text>
  <text x="677" y="508" text-anchor="middle" font-size="7" fill="#c92a2a">No timelock</text>

  <!-- NO timelock callout -->
  <rect x="635" y="420" width="95" height="20" rx="4" fill="#f8cecc" stroke="#c92a2a" stroke-width="1"/>
  <text x="682" y="434" text-anchor="middle" font-size="9" font-weight="bold" fill="#c92a2a">NO timelock</text>

  <!-- VectorX Relayer -> SP1Vector Contract -->
  <line x1="550" y1="382" x2="440" y2="453" stroke="#7048e8" stroke-width="1.8" marker-end="url(#arr-p)"/>
  <text x="480" y="410" text-anchor="middle" font-size="7" fill="#7048e8">commitHeaderRange()</text>

  <!-- Guardian -> SP1Vector -->
  <line x1="600" y1="485" x2="532" y2="485" stroke="#c92a2a" stroke-width="1.3" marker-end="url(#arr-r)"/>
  <text x="566" y="478" text-anchor="middle" font-size="7" fill="#c92a2a">upgrade</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND                                      -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="15" y="548" width="870" height="42" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="0.7"/>

  <!-- Row 1 -->
  <rect x="30" y="556" width="12" height="12" rx="2" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="48" y="566" font-size="8" fill="#555">Consensus (Validator / Full Node)</text>

  <rect x="210" y="556" width="12" height="12" rx="2" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="228" y="566" font-size="8" fill="#555">Light Client (DAS)</text>

  <rect x="340" y="556" width="12" height="12" rx="2" fill="#fff2cc" stroke="#e67700" stroke-width="1"/>
  <text x="358" y="566" font-size="8" fill="#555">Bridge Infra (VectorX)</text>

  <rect x="480" y="556" width="12" height="12" rx="2" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="498" y="566" font-size="8" fill="#555">On-chain Contract</text>

  <rect x="600" y="556" width="12" height="12" rx="2" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="618" y="566" font-size="8" fill="#555">Governance / Risk</text>

  <line x1="710" y1="562" x2="735" y2="562" stroke="#999" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="742" y="566" font-size="8" fill="#555">Trust Boundary</text>

  <!-- Row 2 -->
  <text x="30" y="582" font-size="7" fill="#888">TB0: Fee-only entry</text>
  <text x="160" y="582" font-size="7" fill="#888">TB3: DAS via Full Node RPC only (DHT ~ 0%)</text>
  <text x="430" y="582" font-size="7" fill="#888">TB4-TB5: VectorX single-EOA relayer, no upgrade timelock</text>
  <text x="770" y="582" font-size="7" fill="#c92a2a" font-weight="600">! Risk callouts in red</text>
</svg>
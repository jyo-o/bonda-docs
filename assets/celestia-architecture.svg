<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600"
     font-family="Virgil, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#444" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-grn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#37b24d" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-org" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#e67700" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-pur" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#7048e8" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fcfcfa" rx="8"/>

  <!-- =========================================== -->
  <!-- TRUST BOUNDARIES (dashed rectangles)        -->
  <!-- =========================================== -->

  <!-- TB0: PFB entry -->
  <rect x="20" y="52" width="180" height="270" rx="10" fill="none"
        stroke="#e8590c" stroke-width="1.4" stroke-dasharray="8,5" opacity="0.55"/>
  <text x="30" y="70" font-size="10" fill="#e8590c" font-weight="600" opacity="0.8">TB0  PFB entry (permissionless)</text>

  <!-- TB1: Consensus to DA bridge ingest -->
  <rect x="210" y="52" width="310" height="270" rx="10" fill="none"
        stroke="#e67700" stroke-width="1.4" stroke-dasharray="8,5" opacity="0.55"/>
  <text x="220" y="70" font-size="10" fill="#e67700" font-weight="600" opacity="0.8">TB1  Consensus -> DA bridge ingest</text>

  <!-- TB2: DAS sampling -->
  <rect x="530" y="52" width="200" height="270" rx="10" fill="none"
        stroke="#37b24d" stroke-width="1.4" stroke-dasharray="8,5" opacity="0.55"/>
  <text x="540" y="70" font-size="10" fill="#37b24d" font-weight="600" opacity="0.8">TB2  DAS sampling</text>

  <!-- Ethereum L1 boundary -->
  <rect x="20" y="430" width="860" height="150" rx="12" fill="#f1f0fb"
        stroke="#7048e8" stroke-width="1.6" stroke-dasharray="10,5" opacity="0.6"/>
  <text x="40" y="452" font-size="11" fill="#7048e8" font-weight="700" opacity="0.85">Ethereum L1</text>

  <!-- =========================================== -->
  <!-- SUBMISSION FLOW (top row)                   -->
  <!-- =========================================== -->

  <!-- BlobTx label -->
  <rect x="38" y="100" width="145" height="52" rx="10" fill="#e7f5ff" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="110" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1971c2">BlobTx</text>
  <text x="110" y="138" text-anchor="middle" font-size="9" fill="#5c7cfa">(PayForBlobs MsgType)</text>

  <!-- Consensus (CometBFT) -->
  <rect x="230" y="82" width="270" height="90" rx="12" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="1.6"/>
  <text x="365" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#364fc7">Consensus (CometBFT)</text>
  <text x="365" y="124" text-anchor="middle" font-size="10" fill="#5c7cfa">Block production, EDS + DAH construction</text>

  <!-- Submission sub-steps inside consensus -->
  <text x="250" y="152" font-size="9" fill="#5c7cfa">PrepareProposal</text>
  <text x="340" y="152" font-size="9" fill="#5c7cfa">-></text>
  <text x="356" y="152" font-size="9" fill="#5c7cfa">ProcessProposal</text>
  <text x="452" y="152" font-size="9" fill="#5c7cfa">-></text>
  <text x="466" y="152" font-size="9" fill="#5c7cfa">Finality</text>

  <!-- Arrow: BlobTx -> Consensus -->
  <line x1="183" y1="126" x2="228" y2="126" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- =========================================== -->
  <!-- DAS FLOW (middle row)                       -->
  <!-- =========================================== -->

  <!-- Bridge Node -->
  <rect x="280" y="200" width="200" height="70" rx="12" fill="#d3f9d8" stroke="#37b24d" stroke-width="1.6"/>
  <text x="380" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#2b8a3e">Bridge Node</text>
  <text x="380" y="243" text-anchor="middle" font-size="9" fill="#51cf66">Receives raw blocks, constructs EDS</text>
  <text x="380" y="257" text-anchor="middle" font-size="9" fill="#51cf66">Serves via shrex + bitswap</text>

  <!-- Light Node -->
  <rect x="548" y="200" width="165" height="70" rx="12" fill="#ebfbee" stroke="#69db7c" stroke-width="1.5"/>
  <text x="630" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#2b8a3e">Light Node</text>
  <text x="630" y="243" text-anchor="middle" font-size="9" fill="#51cf66">DAS sampling, 16 random cells</text>
  <text x="630" y="257" text-anchor="middle" font-size="9" fill="#51cf66">Client-only</text>

  <!-- Arrow: Consensus -> Bridge Node -->
  <line x1="365" y1="172" x2="365" y2="198" stroke="#37b24d" stroke-width="1.6" marker-end="url(#arr-grn)"/>
  <text x="374" y="190" font-size="8" fill="#37b24d">raw block</text>

  <!-- Arrow: Bridge Node -> Light Node (shrex/bitswap) -->
  <line x1="480" y1="235" x2="546" y2="235" stroke="#37b24d" stroke-width="1.6" marker-end="url(#arr-grn)"/>
  <text x="513" y="228" text-anchor="middle" font-size="8" fill="#37b24d">shrex / bitswap</text>

  <!-- Callout: Light nodes cannot peer with each other -->
  <rect x="582" y="278" width="158" height="30" rx="6" fill="#fff3bf" stroke="#fab005" stroke-width="1" opacity="0.9"/>
  <text x="590" y="292" font-size="8.5" fill="#e67700" font-weight="600">Light nodes cannot peer</text>
  <text x="590" y="302" font-size="8.5" fill="#e67700" font-weight="600">with each other</text>

  <!-- =========================================== -->
  <!-- BLOBSTREAM FLOW (bottom, into Ethereum)     -->
  <!-- =========================================== -->

  <!-- Blobstream Relayer -->
  <rect x="50" y="350" width="190" height="55" rx="12" fill="#fff4e6" stroke="#e67700" stroke-width="1.5"/>
  <text x="145" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#d9480f">Blobstream Relayer</text>
  <text x="145" y="390" text-anchor="middle" font-size="9" fill="#e67700">Relays validator commitments</text>

  <!-- SP1 Prover -->
  <rect x="300" y="350" width="180" height="55" rx="12" fill="#fff4e6" stroke="#e67700" stroke-width="1.5"/>
  <text x="390" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#d9480f">SP1 Prover</text>
  <text x="390" y="390" text-anchor="middle" font-size="9" fill="#e67700">PLONK proof generation</text>

  <!-- SP1 Verifier Contract (inside Ethereum boundary) -->
  <rect x="550" y="468" width="220" height="65" rx="12" fill="#e5dbff" stroke="#7048e8" stroke-width="1.6"/>
  <text x="660" y="493" text-anchor="middle" font-size="13" font-weight="700" fill="#5f3dc4">SP1 Verifier Contract</text>
  <text x="660" y="510" text-anchor="middle" font-size="9" fill="#7950f2">On-chain verification (write-only oracle)</text>
  <text x="660" y="524" text-anchor="middle" font-size="9" fill="#7950f2">Ethereum L1</text>

  <!-- Arrow: Consensus -> Relayer -->
  <path d="M300,172 L300,180 Q300,188 292,188 L162,188 Q145,188 145,200 L145,348"
        fill="none" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-org)"/>
  <text x="155" y="276" font-size="8" fill="#e67700">validator</text>
  <text x="155" y="286" font-size="8" fill="#e67700">commitments</text>

  <!-- Arrow: Relayer -> SP1 Prover -->
  <line x1="240" y1="377" x2="298" y2="377" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-org)"/>

  <!-- Arrow: SP1 Prover -> SP1 Verifier -->
  <path d="M480,377 L520,377 Q540,377 540,400 L540,490 L548,490"
        fill="none" stroke="#7048e8" stroke-width="1.6" marker-end="url(#arr-pur)"/>
  <text x="505" y="440" font-size="8" fill="#7048e8">PLONK proof</text>

  <!-- =========================================== -->
  <!-- CALLOUT: 0 verifyAttestation calls          -->
  <!-- =========================================== -->
  <rect x="555" y="540" width="210" height="24" rx="6" fill="#ffe3e3" stroke="#ff6b6b" stroke-width="1" opacity="0.9"/>
  <text x="660" y="556" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="700">0 verifyAttestation calls</text>

  <!-- =========================================== -->
  <!-- FLOW LABELS (secondary)                     -->
  <!-- =========================================== -->

  <!-- Submission flow label -->
  <rect x="745" y="100" width="130" height="44" rx="8" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="810" y="117" text-anchor="middle" font-size="9" fill="#868e96" font-weight="600">SUBMISSION FLOW</text>
  <text x="810" y="132" text-anchor="middle" font-size="8" fill="#adb5bd">BlobTx -> Finality</text>

  <!-- DAS flow label -->
  <rect x="745" y="155" width="130" height="44" rx="8" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="810" y="172" text-anchor="middle" font-size="9" fill="#37b24d" font-weight="600">DAS FLOW</text>
  <text x="810" y="187" text-anchor="middle" font-size="8" fill="#69db7c">Light &lt;- Bridge &lt;- Consensus</text>

  <!-- Blobstream flow label -->
  <rect x="745" y="210" width="130" height="44" rx="8" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="810" y="227" text-anchor="middle" font-size="9" fill="#e67700" font-weight="600">BLOBSTREAM FLOW</text>
  <text x="810" y="242" text-anchor="middle" font-size="8" fill="#fab005">Consensus -> Ethereum</text>

  <!-- =========================================== -->
  <!-- TITLE                                        -->
  <!-- =========================================== -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#333">Celestia Data Flow Architecture</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#868e96">CometBFT Consensus  |  DAS Network  |  Blobstream Bridge to Ethereum</text>

</svg>
